name: Bug report
description: Report a reproducible problem in win-desktop-utils
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Paste a small Rust snippet or steps to reproduce.
      render: rust
    validations:
      required: true
  - type: input
    id: crate-version
    attributes:
      label: Crate version
      placeholder: "0.5.7"
    validations:
      required: true
  - type: input
    id: rust-version
    attributes:
      label: Rust version
      placeholder: "rustc 1.82.0"
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2"
    validations:
      required: true
